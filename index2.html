<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masale Arpan | Pure Hand-Pounded Spices — Gurugram</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #b5400a;
  --primary-dark: #8c2e05;
  --primary-light: #e8581a;
  --cream: #fdf6ee;
  --cream-dark: #f5e9d6;
  --dark: #1e1209;
  --mid: #5c3d1e;
  --muted: #9a7355;
  --green: #25D366;
  --white: #ffffff;
  --border: rgba(181,64,10,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(30,18,9,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-icon{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--cream)}
.nav-logo-icon img{width:100%;height:100%;object-fit:contain}
.nav-logo-text{color:var(--white);font-family:'Playfair Display',serif;font-size:18px;font-weight:700;letter-spacing:0.02em}
.nav-logo-text span{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:400;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase}

/* ── ABOUT SECTION ── */
.about-section{background:var(--dark);padding:60px 24px}
.about-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
.about-img-col{display:flex;flex-direction:column;gap:12px}
.about-logo-box{background:var(--cream);border-radius:16px;padding:24px;display:flex;align-items:center;justify-content:center}
.about-logo-box img{width:100%;max-width:220px;height:auto;object-fit:contain}
.about-machine-note{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 16px;font-size:12px;color:rgba(255,255,255,0.6);line-height:1.6}
.about-machine-note strong{color:var(--primary-light);display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:0.06em}
.about-text-col{}
.about-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--primary-light);margin-bottom:12px}
.about-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3.5vw,2.2rem);font-weight:700;color:#fff;line-height:1.2;margin-bottom:16px}
.about-title em{color:var(--primary-light);font-style:normal}
.about-body{font-size:14px;color:rgba(255,255,255,0.65);line-height:1.8;font-weight:300;margin-bottom:20px}
.about-facts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.afact{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px}
.afact-val{font-size:16px;font-weight:700;color:#fff;font-family:'Playfair Display',serif;margin-bottom:2px}
.afact-lbl{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.05em}
.fssai-bar{margin-top:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.fssai-logo{font-size:22px}
.fssai-text{font-size:11px;color:rgba(255,255,255,0.55);line-height:1.6}
.fssai-text strong{color:rgba(255,255,255,0.85);display:block;font-size:12px}
@media(max-width:640px){.about-inner{grid-template-columns:1fr}.about-facts{grid-template-columns:1fr 1fr}}
.nav-links{display:flex;gap:28px}
.nav-links a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:13px;font-weight:500;letter-spacing:0.02em;transition:color 0.2s}
.nav-links a:hover{color:#fff}
.nav-cart{position:relative;background:var(--primary);color:#fff;border:none;padding:8px 18px;border-radius:24px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.2s}
.nav-cart:hover{background:var(--primary-light)}
.nav-cart .cnt{background:rgba(255,255,255,0.25);min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;padding:0 4px}

/* ── HERO ── */
.hero{height:100vh;min-height:560px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 40px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1596040033229-a9821ebd058d?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(30,18,9,0.88) 0%,rgba(140,46,5,0.72) 100%)}
.hero-content{position:relative;z-index:1;max-width:680px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 14px;margin-bottom:22px;color:rgba(255,255,255,0.85);font-size:12px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.hero-dot{width:6px;height:6px;background:var(--primary-light);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,6vw,4.5rem);font-weight:900;color:#fff;line-height:1.08;margin-bottom:16px;letter-spacing:-0.01em}
.hero h1 em{color:var(--primary-light);font-style:normal}
.hero-sub{font-size:1.05rem;color:rgba(255,255,255,0.75);line-height:1.65;margin-bottom:32px;font-weight:300}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{padding:14px 28px;background:var(--primary);color:#fff;border:none;border-radius:28px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:background 0.2s,transform 0.15s}
.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px)}
.btn-outline{padding:14px 28px;background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.4);border-radius:28px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s}
.btn-outline:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.7)}
.hero-badges{position:relative;z-index:1;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:40px}
.hbadge{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 14px;color:rgba(255,255,255,0.8);font-size:12px;display:flex;align-items:center;gap:6px}
.hbadge svg{width:14px;height:14px;flex-shrink:0}

/* ── TRUST BAR ── */
.trust-bar{background:var(--dark);padding:14px 24px}
.trust-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.trust-item{color:rgba(255,255,255,0.65);font-size:12px;display:flex;align-items:center;gap:7px}
.trust-item svg{width:14px;height:14px;color:var(--primary-light);flex-shrink:0}

/* ── PRODUCTS ── */
.products-section{padding:72px 24px;max-width:1200px;margin:0 auto}
.section-header{text-align:center;margin-bottom:48px}
.section-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--primary);margin-bottom:10px}
.section-header h2{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;color:var(--dark);line-height:1.2}
.section-header p{margin-top:10px;color:var(--muted);font-size:15px;font-weight:300}

.filter-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:36px;flex-wrap:wrap}
.ftab{padding:7px 18px;border:1.5px solid var(--border);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s}
.ftab:hover{border-color:var(--primary);color:var(--primary)}
.ftab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.product-card{background:var(--white);border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:transform 0.2s,box-shadow 0.2s;display:flex;flex-direction:column}
.product-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(181,64,10,0.12)}
.product-card.hidden{display:none}
.prod-img-wrap{position:relative;height:200px;overflow:hidden;background:var(--cream)}
.prod-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.product-card:hover .prod-img-wrap img{transform:scale(1.05)}
.prod-badge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;padding:3px 9px;border-radius:10px}
.badge-sale{background:#ffeaea;color:#a32d2d}
.badge-fresh{background:#eaf3de;color:#27500a}
.badge-popular{background:#faeeda;color:#633806}
.prod-info{padding:16px;flex:1;display:flex;flex-direction:column}
.prod-name{font-weight:600;font-size:14px;color:var(--dark);margin-bottom:3px;line-height:1.3}
.prod-desc{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;font-weight:300}
.prod-rating{display:flex;align-items:center;gap:4px;margin-bottom:10px}
.stars{color:#e8a020;font-size:12px;letter-spacing:-1px}
.rating-cnt{font-size:11px;color:var(--muted)}
.prod-price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:12px}
.prod-price{font-size:18px;font-weight:700;color:var(--primary);font-family:'Playfair Display',serif}
.prod-mrp{font-size:12px;color:var(--muted);text-decoration:line-through}
.prod-savings{font-size:11px;font-weight:600;color:#27500a;background:#eaf3de;padding:1px 7px;border-radius:6px}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:auto}
.qbtn{width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:transparent;font-size:16px;cursor:pointer;color:var(--dark);display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.qbtn:hover{border-color:var(--primary);color:var(--primary)}
.qnum{font-size:14px;font-weight:600;min-width:20px;text-align:center;color:var(--dark)}
.add-btn{flex:1;padding:7px 12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.add-btn:hover{background:var(--primary-light)}
.add-btn.added{background:#3B6D11}

/* ── CART PANEL ── */
.cart-section{max-width:860px;margin:0 auto 80px;padding:0 24px}
.cart-card{background:var(--white);border-radius:20px;border:1px solid var(--border);overflow:hidden}
.cart-head{padding:18px 24px;background:var(--dark);display:flex;align-items:center;justify-content:space-between}
.cart-head-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px}
.cart-head-title .cnt-pill{background:var(--primary);color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px}
.cart-clear{background:transparent;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s}
.cart-clear:hover{border-color:rgba(255,255,255,0.6);color:#fff}
.cart-empty{padding:48px 24px;text-align:center;color:var(--muted);font-size:14px}
.cart-empty-icon{font-size:40px;margin-bottom:12px;opacity:0.5}
.cart-item{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--cream-dark)}
.ci-img{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--cream);flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-unit{font-size:11px;color:var(--muted)}
.ci-qty{font-size:12px;color:var(--muted);white-space:nowrap}
.ci-price{font-size:15px;font-weight:700;color:var(--primary);white-space:nowrap;font-family:'Playfair Display',serif}
.ci-del{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;transition:color 0.2s}
.ci-del:hover{color:#a32d2d}
.cart-summary-bar{display:grid;grid-template-columns:repeat(3,1fr);background:var(--cream);border-top:1px solid var(--cream-dark);border-bottom:1px solid var(--cream-dark)}
.cs-item{padding:14px 20px;text-align:center;border-right:1px solid var(--cream-dark)}
.cs-item:last-child{border-right:none}
.cs-val{font-size:18px;font-weight:700;color:var(--primary);font-family:'Playfair Display',serif}
.cs-lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.promo-row{display:flex;gap:10px;padding:16px 24px;border-bottom:1px solid var(--cream-dark);align-items:center}
.promo-input{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--dark);background:#fff}
.promo-input:focus{outline:none;border-color:var(--primary)}
.promo-btn{padding:9px 18px;border:1.5px solid var(--primary);border-radius:10px;color:var(--primary);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.promo-btn:hover{background:var(--primary);color:#fff}
.promo-msg{font-size:12px;color:#27500a;padding:0 24px 10px;display:none}
.cart-actions{padding:16px 24px;display:flex;gap:12px;align-items:center;justify-content:flex-end}
.checkout-btn{padding:12px 28px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.2s}
.checkout-btn:hover{background:var(--primary-light)}
.checkout-btn:disabled{background:#ccc;cursor:not-allowed}

/* ── CHECKOUT FORM ── */
.checkout-form-section{display:none;max-width:860px;margin:0 auto 80px;padding:0 24px}
.cf-card{background:var(--white);border-radius:20px;border:1px solid var(--border);overflow:hidden}
.cf-head{padding:18px 24px;background:var(--dark)}
.cf-head h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff}
.cf-head p{font-size:12px;color:rgba(255,255,255,0.55);margin-top:2px}
.steps-bar{display:flex;padding:0;border-bottom:1px solid var(--cream-dark)}
.step-item{flex:1;padding:12px 8px;text-align:center;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--cream-dark);background:var(--cream);cursor:default}
.step-item:last-child{border-right:none}
.step-item.active{background:var(--primary);color:#fff}
.step-item.done{background:#eaf3de;color:#27500a}
.cf-body{padding:24px}
.fblock{margin-bottom:24px}
.fb-title{font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--primary);margin-bottom:14px;padding-bottom:8px;border-bottom:1.5px solid var(--cream-dark)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgrid .full{grid-column:1/-1}
.fgrp{display:flex;flex-direction:column;gap:4px}
.fgrp label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted)}
.fgrp input,.fgrp select,.fgrp textarea{padding:10px 13px;border:1.5px solid #e5d5c5;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--dark);background:#fff;width:100%;transition:border-color 0.2s}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{outline:none;border-color:var(--primary)}
.fgrp textarea{resize:none;height:60px}
.ferr{font-size:11px;color:#a32d2d;min-height:14px;font-weight:500}
.pay-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.popt{border:1.5px solid #e5d5c5;border-radius:12px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--mid);transition:all 0.2s}
.popt:hover{border-color:var(--primary)}
.popt.sel{border-color:var(--primary);background:#fff8f3;color:var(--primary)}
.popt-radio{width:16px;height:16px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.popt.sel .popt-radio{border-color:var(--primary)}
.popt.sel .popt-radio::after{content:'';width:6px;height:6px;background:var(--primary);border-radius:50%;display:block}
.popt-icon{font-size:20px;flex-shrink:0}
.popt-text{line-height:1.3}
.popt-name{font-weight:600;font-size:13px}
.popt-desc{font-size:11px;opacity:0.7}
.order-review{background:var(--cream);border-radius:12px;padding:16px;margin-bottom:20px}
.or-title{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.or-row{display:flex;justify-content:space-between;font-size:13px;color:var(--mid);padding:4px 0}
.or-divider{border:none;border-top:1px solid var(--cream-dark);margin:8px 0}
.or-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:var(--dark);padding:4px 0}
.or-total span:last-child{color:var(--primary);font-family:'Playfair Display',serif}
.addr-confirm{background:var(--cream);border:1.5px solid #e5d5c5;border-radius:12px;padding:14px 16px;margin-bottom:20px}
.ac-label{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.ac-text{font-size:13px;color:var(--dark);line-height:1.7}
.place-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background 0.2s;margin-top:8px}
.place-btn:hover{background:var(--primary-light)}
.btn-back{background:transparent;border:1.5px solid var(--border);border-radius:12px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--mid);cursor:pointer;transition:all 0.2s;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.btn-back:hover{border-color:var(--primary);color:var(--primary)}

/* ── SUCCESS ── */
.success-section{display:none;max-width:860px;margin:0 auto 80px;padding:0 24px}
.success-card{background:var(--white);border-radius:20px;border:1px solid #c0dd97;overflow:hidden}
.success-head{background:linear-gradient(135deg,#27500a,#3b6d11);padding:32px 24px;text-align:center}
.success-circle{width:64px;height:64px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
.success-head h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:6px}
.success-head p{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6;max-width:400px;margin:0 auto}
.order-id{display:inline-block;margin-top:12px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 16px;font-size:12px;color:#fff;font-weight:600;letter-spacing:0.06em}
.success-body{padding:24px}
.eta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.eta-item{background:var(--cream);border-radius:12px;padding:14px;text-align:center}
.eta-icon{font-size:22px;margin-bottom:6px}
.eta-val{font-size:15px;font-weight:700;color:var(--dark);font-family:'Playfair Display',serif}
.eta-lbl{font-size:11px;color:var(--muted)
