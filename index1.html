<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masale Arpan</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#fff7f0;
}

header {
  background:#b5400a;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.hero {
  padding:30px;
  text-align:center;
}

.hero h1 {
  font-size:32px;
  margin-bottom:10px;
}

.hero p {
  font-size:14px;
  color:#444;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

button {
  background:#b5400a;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

.cart {
  padding:20px;
  background:white;
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px 20px;
  border-radius:20px;
}
</style>
</head>

<body>

<header>🌶 Masale Arpan</header>

<div class="hero">
  <h1>Asli Kuta Hua Masala</h1>
  <p>
  Na factory ka powder, na machine ki garam pisai.<br>
  Yeh hai asli ghar jaisa swaad.
  </p>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h3>🛒 Cart</h3>
  <div id="cart"></div>
  <br>
  <button onclick="placeOrder()">Order on WhatsApp</button>
</div>

<script>

const WA_NUMBER = "919266095118";

const PRODUCTS = [
  {id:1,name:"Haldi 100g",price:45},
  {id:2,name:"Dhaniya 100g",price:39},
  {id:3,name:"Lal Mirch 100g",price:65}
];

let cart = {};

function renderProducts(){
  let html='';
  PRODUCTS.forEach(p=>{
    html+=`
      <div class="card">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add</button>
      </div>
    `;
  });
  document.getElementById('products').innerHTML=html;
}

function addToCart(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(cart[id]) cart[id].qty++;
  else cart[id]={...p,qty:1};

  renderCart();
  showToast("Added to cart ✅");
}

function renderCart(){
  let html='';
  let total=0;

  Object.values(cart).forEach(i=>{
    total += i.price*i.qty;
    html+=${i.name} x ${i.qty} = ₹${i.price*i.qty}<br>;
  });

  html+=<br><b>Total: ₹${total}</b>;

  document.getElementById('cart').innerHTML=html;
}

function placeOrder(){

  if(Object.keys(cart).length===0){
    alert("Cart empty hai");
    return;
  }

  let msg = "🌶 Masale Arpan Order\n\n";

  let total=0;

  Object.values(cart).forEach(i=>{
    msg+=${i.name} x ${i.qty} = ₹${i.price*i.qty}\n;
    total+=i.price*i.qty;
  });

  msg+=\nTotal: ₹${total};

  window.open(https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)});
}

function showToast(msg){
  let t=document.createElement('div');
  t.className='toast';
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

renderProducts();

</script>

</body>
</html>
